name: Governance Pipeline

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

jobs:
  governance:
    name: Governance Engine
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      allowed: ${{ steps.governance.outputs.allowed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Run Governance
        id: governance
        uses: Programming-Club-Curtin-Colombo/governance@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          discord-webhook-url: ${{ secrets.DISCORD_AUDIT_WEBHOOK_URL }}
          governance-webhook-url: ${{ secrets.GOVERNANCE_WEBHOOK_URL }}

  enforce:
    name: Enforce Governance
    runs-on: ubuntu-latest
    needs: governance

    steps:
      - name: Validate Governance Result
        run: |
          if [ "${{ needs.governance.outputs.allowed }}" != "true" ]; then
            echo "Governance blocked operation"
            exit 1
          fi

          echo "Governance passed"
